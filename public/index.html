<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo | Webnesday SSE</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="demo container">
<h1>Rate the Talk</h1>
<ul>
    <li class="vote-button" data-value="5"><div class="stars">⭐⭐⭐⭐⭐</div><div class="result"></div></li>
    <li class="vote-button" data-value="4"><div class="stars">⭐⭐⭐⭐</div><span class="result"></span></li>
    <li class="vote-button" data-value="3"><div class="stars">⭐⭐⭐</div><span class="result"></span></li>
    <li class="vote-button" data-value="2"><div class="stars">⭐⭐</div><span class="result"></span></li>
    <li class="vote-button" data-value="1"><div class="stars">⭐</div><span class="result"></span></li>
</ul>
</div>
<pre id="debug"></pre>
<script>
    const t = document.getElementById('debug');
    function writeDebug(message) {
        t.innerText += `\n${message}`;
    }
    const events = new EventSource('http://localhost:3000/events');
    const voteButtons = document.querySelectorAll(".vote-button");

    function renderVotes(payload) {
        const totalVotes = Object.values(payload.votes ?? {}).reduce((sum, entry) => sum + (entry.votes ?? 0), 0);

        voteButtons.forEach(button => {
            const voteValue = button.dataset['value'];
            const resultElement = button.querySelector('.result');
            const count = payload.votes?.[voteValue]?.votes ?? 0;
            const percentage = totalVotes > 0 ? Math.round((count / totalVotes) * 100) : 0;

            resultElement.textContent = count > 0 ? `(${count}, ${percentage}%)` : '';
            button.style.backgroundImage = percentage > 0
                ? `linear-gradient(90deg, rgba(255, 72, 72, 0.45) ${percentage}%, transparent ${percentage}%)`
                : '';
        });
    }

    events.addEventListener("message", (event) => {
        writeDebug(event.data);
    })
    events.addEventListener("clients", (event) => console.log("clients connected", event.data));
    events.addEventListener("votes", (event) => {
        console.log("votes", event.data);
        renderVotes(JSON.parse(event.data));
    });

    voteButtons.forEach(button => button.addEventListener("click", (event) => {
        const vote = Number.parseInt(button.dataset['value']);
        writeDebug(`Submitting vote: ${vote}`);
        fetch('/votes',{method: 'POST', headers: {'content-type': 'application/json'}, body: JSON.stringify({vote})});
    }))
</script>
</body>
</html>
