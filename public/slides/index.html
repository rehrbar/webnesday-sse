# Server

- Express based for simplicity.
- Using _bun_ runtime.
- Serves static files and API.
- Keeps connection open for each client.
- Accepts votes from clients.
- Sends updates to each client.

---

# Server

- Headers signal client to keep the connection alive.
- `response` will never be closed.

```typescript
app.get('/events', (request: express.Request, response: express.Response) => {
  const headers = {
    'Content-Type': 'text/event-stream',
    'Connection': 'keep-alive',
    'Cache-Control': 'no-cache'
  };
  response.writeHead(200, headers);
  // ...
}
```

---

# Server

- Store each connected client.
- Remove disconnected clients.

```typescript
  // ...
  const clientId = self.crypto.randomUUID();

  const newClient = {
    id: clientId,
    response
  };

  clients.push(newClient);
  // Handle client disconnecting and remove them from the list receiving updates.
  request.on('close', () => {
    console.log(`${clientId} Connection closed`);
    clients = clients.filter(client => client.id !== clientId);
    sendClientCountToAll();
  });
  // ...
```

---

# Server

- Sending event to all connected clients.
  - `event`: Identifier for the type (optional).
  - `data`: The data field for the message.
- Double new lines `\n\n` are required to distinguish events.
  - Otherwise concatenated.
- Data needs to be serialized (e.g. `JSON.stringify()`).

```typescript
function sendClientCountToAll() {
    clients.forEach(client => client.response.write(
        `event: clients\ndata: ${clients.length}\n\n`
    ));
}
```

---

# Client

- Subscribes to events from the server at `/events`.
- Handle the events as you like.
- Deserialize data if required.

```javascript
const events = new EventSource('/events');
events.addEventListener("message", (event) => {
    // Handle event without type.
})
events.addEventListener("votes", (event) => {
    // Handle event: votes
})
```

# Debugging

- Browser Developer-Tools - Network Monitor
  - Request might be marked as completed.
  - Enable _Event Name_ column.
- Errors might be visible in the console (e.g. interruptions).
- If _event type_ is not specified, events might not be visible.

<img src="debug-browser.png" alt="Debugging in Firefox" />

---

# Debugging

- Man-in-the-Middle proxy
  - Might close the connection.
  - Output is garbled.
  - Required for debugging non-browser clients.
- `curl`
  - Raw text output.
